<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flask Login App | Home</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
<div class="home-page">
    <div class="home-hero">
        <div>
            <p class="home-badge">Welcome back</p>
            <h1>Beautiful Dashboard</h1>
            <p class="home-description">Your account details are safely stored and ready to use. Enjoy a smooth, clean experience after login.</p>
        </div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>

    <section class="profile-card">
        <div class="profile-card-header">
            <div>
                <p class="small-label">Logged in as</p>
                <h2>{{ user.name }}</h2>
            </div>
            <div class="profile-status">Active</div>
        </div>

        <div class="profile-content">
            <div class="profile-item">
                <span>Username</span>
                <strong>{{ user.username }}</strong>
            </div>
            <div class="profile-item">
                <span>Full Name</span>
                <strong>{{ user.name }}</strong>
            </div>
            <div class="profile-item">
                <span>Phone</span>
                <strong>{{ user.phone }}</strong>
            </div>
        </div>
    </section>
</div>

<style>
body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 60%, #ffffff 100%);
    color: #111827;
}

.home-page {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 24px;
}

.home-hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 32px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.08);
    margin-bottom: 32px;
}

.home-badge {
    display: inline-flex;
    margin: 0 0 12px;
    padding: 8px 14px;
    border-radius: 999px;
    background: #eef2ff;
    color: #3730a3;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.01em;
}

.home-hero h1 {
    margin: 0 0 14px;
    font-size: clamp(2rem, 3vw, 3rem);
    line-height: 1.05;
}

.home-description {
    max-width: 620px;
    margin: 0;
    color: #475569;
    font-size: 1rem;
    line-height: 1.8;
}

.logout-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 130px;
    padding: 14px 20px;
    border-radius: 999px;
    background: #4f46e5;
    color: white;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 16px 36px rgba(79, 70, 229, 0.18);
    transition: transform 0.2s ease, background 0.2s ease;
}

.logout-btn:hover {
    transform: translateY(-1px);
    background: #4338ca;
}

.profile-card {
    background: white;
    border-radius: 28px;
    padding: 32px;
    box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
}

.profile-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
}

.small-label {
    margin: 0 0 8px;
    font-size: 0.9rem;
    color: #475569;
}

.profile-card-header h2 {
    margin: 0;
    font-size: 2rem;
    color: #111827;
}

.profile-status {
    padding: 10px 18px;
    border-radius: 999px;
    background: #d1fae5;
    color: #065f46;
    font-weight: 700;
    font-size: 0.95rem;
}

.profile-content {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 20px;
}

.profile-item {
    background: #f8fafc;
    border-radius: 20px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.profile-item span {
    font-size: 0.95rem;
    color: #64748b;
}

.profile-item strong {
    font-size: 1.1rem;
    color: #0f172a;
}

@media (max-width: 840px) {
    .home-hero {
        flex-direction: column;
        text-align: left;
    }

    .profile-content {
        grid-template-columns: 1fr;
    }
}
</style>
</body>
</html>
